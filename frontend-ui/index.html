<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VisionWave Guardian - 基於毫米波雷達的智慧視力與健康監測系統">
    <title>VisionWave Guardian - 智慧健康守護系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="20" r="18" stroke="url(#gradient1)" stroke-width="2" fill="none" />
                            <circle cx="20" cy="20" r="12" fill="url(#gradient2)" />
                            <circle cx="20" cy="20" r="6" fill="white" opacity="0.8" />
                            <defs>
                                <linearGradient id="gradient1" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#667eea" />
                                    <stop offset="100%" stop-color="#764ba2" />
                                </linearGradient>
                                <linearGradient id="gradient2" x1="0" y1="0" x2="40" y2="40">
                                    <stop offset="0%" stop-color="#667eea" stop-opacity="0.4" />
                                    <stop offset="100%" stop-color="#764ba2" stop-opacity="0.6" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>VisionWave Guardian</h1>
                </div>
                <div class="header-status">
                    <div class="status-badge" id="system-status">
                        <span class="status-dot"></span>
                        <span class="status-text">系統運作中</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Alert Banner -->
            <div class="alert-container" id="alert-container"></div>

            <!-- Real-time Monitor Dashboard -->
            <section class="dashboard-section">
                <h2 class="section-title">即時監測儀表板</h2>
                <div class="dashboard-grid">
                    <!-- Distance Monitor Card -->
                    <div class="monitor-card" id="distance-card">
                        <div class="card-header">
                            <div class="card-icon distance-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </div>
                            <h3 class="card-title">視距監測</h3>
                        </div>
                        <div class="card-content">
                            <div class="status-indicator" id="distance-status">
                                <div class="status-circle"></div>
                                <span class="status-label">檢測中...</span>
                            </div>
                            <div class="metric-value" id="distance-value">--</div>
                            <div class="metric-description">建議保持 60 公分以上安全距離</div>
                        </div>
                        <div class="card-footer">
                            <div class="progress-bar">
                                <div class="progress-fill" id="distance-progress"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Sitting Duration Card -->
                    <div class="monitor-card" id="sitting-card">
                        <div class="card-header">
                            <div class="card-icon sitting-icon">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />
                                    <path d="M8 8v5h8V8M6 13h12l-1 8H7l-1-8z" />
                                </svg>
                            </div>
                            <h3 class="card-title">久坐監測</h3>
                        </div>
                        <div class="card-content">
                            <div class="status-indicator" id="sitting-status">
                                <div class="status-circle"></div>
                                <span class="status-label">檢測中...</span>
                            </div>
                            <div class="metric-value" id="sitting-timer">00:00</div>
                            <div class="metric-description">建議每 30 分鐘起身活動</div>
                        </div>
                        <div class="card-footer">
                            <div class="progress-bar">
                                <div class="progress-fill" id="sitting-progress"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Statistics Section -->
            <section class="statistics-section">
                <h2 class="section-title">統計分析</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="total-time">0 分鐘</div>
                            <div class="stat-label">總監測時間</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="safe-percentage">100%</div>
                            <div class="stat-label">安全距離比例</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="alert-count">0</div>
                            <div class="stat-label">警示次數</div>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <path d="M9 3v18M3 9h18M3 15h18" />
                            </svg>
                        </div>
                        <div class="stat-content">
                            <div class="stat-value" id="avg-sitting">0 分鐘</div>
                            <div class="stat-label">平均久坐時長</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <h2 class="section-title">📊 健康趨勢分析（最近 10 分鐘）</h2>
                <div class="chart-container">
                    <canvas id="healthChart"></canvas>
                </div>
            </section>

            <!-- Alert History -->
            <section class="history-section">
                <h2 class="section-title">警示記錄</h2>
                <div class="history-container" id="history-container">
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
                            <path d="M12 16v-4M12 8h.01" />
                        </svg>
                        <p>目前沒有警示記錄</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 VisionWave Guardian | 國立成功大學 工業與資訊管理學系</p>
        </div>
    </footer>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Main Application Script -->
    <script src="app.js"></script>
</body>

</html>
